name: Job Outputs

on:
  push

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    steps:
      - id: date
        run: |
          echo "date=$(date)" >> $GITHUB_OUTPUT

  consume:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - run: echo "The Generated date is ${{ needs.generate.outputs.date }}"
