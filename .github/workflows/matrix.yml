name: Matrix with Exclude

on:
    workflow_dispatch:

jobs:
  matrix-job:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - python-version: '3.10'
            os: windows-latest
          - python-version: '3.11'
            os: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python version and OS
        run: |
          echo "Running on OS: ${{ matrix.os }}"
          python --version

