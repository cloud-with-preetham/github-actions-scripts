name: Manual Workflow

on:
  workflow_dispatch:
    inputs:
        environment:
          description: 'Environment to deploy'
          required: true
          type: choice
          options:
            - staging
            - production

jobs:
  manual-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected environment
        run: echo "Selected environment:${{ github.event.inputs.environment }}"

