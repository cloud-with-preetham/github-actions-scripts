name: Smart Pipeline

on: push

jobs:
  ## Lint job that runs on every push. If it fails, the subsequent jobs will not run.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: echo "Running linter..."

  ## Test job that depends on the lint job. It will only run if the lint job succeeds.
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  ## Summary job that depends on both lint and test jobs. It will only run if both lint and test jobs succeed.
  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      ## Check if the push is to the main branch or a feature branch and print the commit message
      - run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "This is a push to the main branch."
          else
            echo "This is a push to a feature branch."
          fi
      - run: echo "Commit message:${{ github.event.head_commit.message }}"
