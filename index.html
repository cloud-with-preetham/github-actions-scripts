<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Elite Developer Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Fira+Code&display=swap"
    rel="stylesheet">

  <style>
    /* ================= ROOT ================= */
    :root {
      --bg: #0b0f19;
      --text: white;
      --card: rgba(255, 255, 255, 0.05);
      --accent: #00ffd5;
    }

    .light {
      --bg: #f4f6f8;
      --text: #111;
      --card: white;
    }

    body {
      margin: 0;
      font-family: Poppins;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ================= PARTICLES BG ================= */
    #particles {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* ================= NAVBAR ================= */
    nav {
      position: fixed;
      width: 100%;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      background: rgba(0, 0, 0, .2);
      z-index: 999;
    }

    nav button {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* ================= HERO ================= */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .typing {
      color: var(--accent);
      font-weight: 600;
    }

    /* ================= BUTTON ================= */
    .btn {
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(45deg, #00ffd5, #007cf0);
      cursor: pointer;
      font-weight: 600;
    }

    /* ================= SECTIONS ================= */
    section {
      padding: 90px 8%;
    }

    .title {
      color: var(--accent);
      font-size: 2.2rem;
      margin-bottom: 40px;
    }

    /* ================= PROJECTS ================= */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .project {
      background: var(--card);
      padding: 25px;
      border-radius: 20px;
      transition: .4s;
      position: relative;
      overflow: hidden;
    }

    .project:hover {
      transform: translateY(-10px) scale(1.02);
    }

    .project::after {
      content: "View Project →";
      position: absolute;
      bottom: -40px;
      left: 20px;
      transition: .3s;
      color: var(--accent);
    }

    .project:hover::after {
      bottom: 15px;
    }

    /* ================= TERMINAL ================= */
    .terminal {
      background: #000;
      padding: 25px;
      border-radius: 15px;
      font-family: 'Fira Code';
      color: #00ff88;
      height: 250px;
      overflow: auto;
    }

    /* ================= GITHUB ================= */
    .repo {
      background: var(--card);
      padding: 18px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    /* ================= CURSOR GLOW ================= */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      filter: blur(10px);
      transform: translate(-50%, -50%);
    }

    /* ================= FOOTER ================= */
    footer {
      text-align: center;
      padding: 40px;
      opacity: .6;
    }
  </style>
</head>

<body>

  <canvas id="particles"></canvas>
  <div class="cursor"></div>

  <!-- NAV -->
  <nav>
    <h3>DevElite</h3>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Hi, I'm <span style="color:#00ffd5;">Your Name</span></h1>
    <h2 class="typing"></h2>

    <button class="btn" onclick="downloadResume()">⬇ Download Resume</button>
  </section>

  <!-- DEVOPS TERMINAL -->
  <section>
    <h2 class="title">DevOps Terminal</h2>
    <div class="terminal" id="terminal"></div>
  </section>

  <!-- PROJECTS -->
  <section>
    <h2 class="title">Projects</h2>
    <div class="projects">
      <div class="project">CI/CD Automation Platform</div>
      <div class="project">Kubernetes Deployment System</div>
      <div class="project">AI SaaS Dashboard</div>
    </div>
  </section>

  <!-- GITHUB AUTO FETCH -->
  <section>
    <h2 class="title">GitHub Projects</h2>
    <div id="repos"></div>
  </section>

  <footer>
    © 2026 Elite Portfolio — Built Like a Product 🚀
  </footer>

  <script>

    /* ================= THEME ================= */
    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    /* ================= CURSOR GLOW ================= */
    const cursor = document.querySelector(".cursor");
    document.addEventListener("mousemove", e => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });

    /* ================= TYPING EFFECT ================= */
    const roles = [
      "Full Stack Developer",
      "UI/UX Enthusiast",
      "DevOps Engineer",
      "Cloud Builder"
    ];

    let i = 0, j = 0, current = "", isDeleting = false;
    const typing = document.querySelector(".typing");

    function type() {
      current = roles[i];

      if (!isDeleting) {
        typing.textContent = current.substring(0, j++);
        if (j > current.length) { isDeleting = true; setTimeout(type, 1200); return; }
      } else {
        typing.textContent = current.substring(0, j--);
        if (j === 0) { isDeleting = false; i = (i + 1) % roles.length; }
      }
      setTimeout(type, isDeleting ? 40 : 80);
    }
    type();

    /* ================= TERMINAL ANIMATION ================= */
    const terminalLines = [
      "> initializing devops pipeline...",
      "> docker build success ✔",
      "> kubernetes deployment running...",
      "> github actions triggered...",
      "> production deployed 🚀"
    ];

    let t = 0;
    function terminalTyping() {
      if (t < terminalLines.length) {
        document.getElementById("terminal").innerHTML += terminalLines[t] + "<br>";
        t++;
        setTimeout(terminalTyping, 900);
      }
    }
    terminalTyping();

    /* ================= RESUME DOWNLOAD ================= */
    function downloadResume() {
      window.open("resume.pdf", "_blank");
    }

    /* ================= GITHUB FETCH ================= */
    /* Replace username below */
    fetch("https://api.github.com/users/YOUR_GITHUB_USERNAME/repos")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("repos");
        data.slice(0, 6).forEach(repo => {
          container.innerHTML += `
      <div class="repo">
        <h3>${repo.name}</h3>
        <p>${repo.description || "No description"}</p>
        <a href="${repo.html_url}" target="_blank">View Repo</a>
      </div>`;
        });
      });

    /* ================= PARTICLES BACKGROUND ================= */
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    canvas.width = innerWidth;
    canvas.height = innerHeight;

    let particles = [];
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: Math.random() * 1 - 0.5,
        vy: Math.random() * 1 - 0.5
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#00ffd5";
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

  </script>

</body>

</html>
